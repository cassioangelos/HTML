<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Gradiente em CSS</title>
    <style>
        * { /* configurações globais */
            height: 100%;
        }
        body{
            background-image: linear-gradient(-45deg, #0DAB76, #139A43, #0B5D1E, #053B06, #000000);
            background-attachment: fixed;
        }
    </style>
</head>
<body>
    <h1 style="color: aliceblue;">Testando gradiente</h1>
</body>
</html>
