<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Links</title>
    <style>
        /*
        Seletores personalizados
        # = id
        . = class
        : = pseudo-class
        :: = pseudo-element
        > = children

        */
    
        a {
            text-decoration: none;
            color: black;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
            color: blue;
            font-weight: normal;
        }
        a::after {
            content: '⚓';
        }
        .insta::before {
            content: '';
        }
        .you::before {
            content: '🐝';
        }
        .git::before {
            content: '☠';
        }
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="https://github.com/cassioangelos" target="_blank" class="git">Repositório Github</a></li>
        <li><a href="https://www.youtube.com/@cassioangelos" target="_blank" class="you">Canal Youtube</a></li>
        <li><a href="https://www.instagram.com/cassioangelos/" target="_blank" class="insta">Canal Instagram</a></li>
    </ul>
</body>
</html>
