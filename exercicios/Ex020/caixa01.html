<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Modelo de caixas</title>
    <style>
        body {
            text-align: center;
        }
        h1 {
         background-color: darkorchid;

         height: 100px;
         width: 400px;
         
         padding: 50px;

         border: 30px solid blue;
         
         margin: 50px auto;

         outline: 10px dotted black;   
        }
        a {
         border: 5px dashed burlywood;
        }

    </style>
</head>
<body>
    <h1>Exemplo de caixa Box-level</h1>
    <p>Paragráfos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a> Vamos ver como tudo isso funciona</p>
</body>
</html>
